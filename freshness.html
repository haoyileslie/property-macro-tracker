<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Freshness | Australian Property &amp; Macro Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F7F5EF;--navy:#1F3A6E;--navy-deep:#142748;--ink:#1B1F26;--slate:#5C6773;--line:#DEDACD;--card:#fff;}
  *{box-sizing:border-box;} body{margin:0;background:var(--cream);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;}
  .wrap{max-width:1060px;margin:0 auto;padding:32px 24px 80px;}
  .page-nav{display:flex;gap:18px;margin:0 0 24px;padding:0 0 12px;border-bottom:1px solid var(--line);}
  .page-nav a{color:var(--slate);font-size:.78rem;font-weight:600;text-decoration:none;}.page-nav a:hover,.page-nav a[aria-current="page"]{color:var(--navy);text-decoration:underline;text-underline-offset:5px;}
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;border-bottom:2px solid var(--navy);padding-bottom:18px;}
  h1{margin:0;font-family:'Source Serif 4',serif;font-size:clamp(1.6rem,3vw,2.2rem);color:var(--navy-deep);}.meta{font:0.75rem 'IBM Plex Mono',monospace;color:var(--slate);}
  .deck{margin:14px 0 28px;color:var(--slate);font-family:'Source Serif 4',serif;font-size:1rem;line-height:1.5;}
  .status-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;margin-bottom:24px;border:1px solid var(--line);background:var(--line);}
  .status-summary div{padding:14px 16px;background:#fff;}.status-summary span{display:block;color:var(--slate);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;}.status-summary strong{display:block;margin-top:4px;color:var(--navy-deep);font:500 1.25rem 'IBM Plex Mono',monospace;}
  .health-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1px;border:1px solid var(--line);background:var(--line);}
  .health-card{padding:16px;background:#fff;}.health-card h2{margin:0 0 7px;color:var(--navy-deep);font-size:.9rem;line-height:1.35;}
  .status-pill{display:inline-block;margin-bottom:10px;padding:3px 7px;border-radius:999px;background:#E9EDF5;color:var(--navy-deep);font:500 .66rem 'IBM Plex Mono',monospace;text-transform:uppercase;}
  .status-pill.fresh{background:#E7F1EA;color:#245A37}.status-pill.watch{background:#FFF3D7;color:#7A5316}.status-pill.stale,.status-pill.discontinued{background:#F5E4DF;color:#893F2D}
  .health-card p{margin:0 0 4px;color:var(--slate);font-size:.75rem;line-height:1.45;}.health-card .note{margin-top:9px;color:var(--ink);}
  .health-card a{color:var(--navy);text-underline-offset:3px;}.error{padding:20px;border:1px solid var(--line);background:#fff;color:#893F2D;}
  @media(max-width:600px){header{display:block}.meta{margin-top:8px}}
</style>
</head>
<body>
<main class="wrap">
  <nav class="page-nav" aria-label="Tracker pages">
    <a href="index.html">Dashboard</a>
    <a href="data.html">Data tables</a>
    <a href="freshness.html" aria-current="page">Data freshness</a>
    <a href="listings.html">Market listings</a>
  </nav>
  <header><h1>Data Freshness</h1><div class="meta" id="lastUpdated">Loading...</div></header>
  <p class="deck">Release timing, access method and source checks for every monitored series. Use this view to spot delayed releases and manual dependencies before relying on the dashboard.</p>
  <div class="status-summary" id="statusSummary"></div>
  <div class="health-grid" id="healthGrid"></div>
</main>
<script>
function latest(points){return points?.length?points[points.length-1]:null;}
function formatValue(point,series){if(!point)return 'No data';return series.unit==='count'?Number(point.value).toLocaleString():`${Number(point.value).toLocaleString()}${series.unit||''}`;}
async function init(){
  let data;
  try{const response=await fetch('./property_data.json',{cache:'no-store'});if(!response.ok)throw new Error('Data file unavailable');data=await response.json();}
  catch(error){document.getElementById('healthGrid').outerHTML='<div class="error">Could not load property_data.json. Open this page through the local web server.</div>';return;}
  document.getElementById('lastUpdated').textContent=`Last updated: ${data.meta.last_updated}`;
  const entries=Object.entries(data.series).filter(([,series])=>series.status||series.last_source_check);
  const counts={fresh:0,watch:0,stale:0,discontinued:0}; entries.forEach(([,series])=>{counts[series.status||'watch']=(counts[series.status||'watch']||0)+1;});
  document.getElementById('statusSummary').innerHTML=['fresh','watch','stale','discontinued'].map(status=>`<div><span>${status}</span><strong>${counts[status]||0}</strong></div>`).join('');
  document.getElementById('healthGrid').innerHTML=entries.map(([key,series])=>{
    const point=latest(series.data.National||[]); const source=series.source_url?`<a href="${series.source_url}" target="_blank" rel="noopener">${series.source||'Open source'}</a>`:(series.source||'Not logged'); const status=series.status||'watch';
    const captured=series.snapshot_captured_at?`<p><strong>Snapshot captured:</strong> ${series.snapshot_captured_at}</p>`:'';
    const history=(series.data.National||[]); const historyLine=history.length?`${history[0].date} to ${history[history.length-1].date} · ${history.length} observations`:'No history';
    return `<article class="health-card"><h2>${series.label}</h2><span class="status-pill ${status}">${status}</span><p><strong>History:</strong> ${historyLine}</p><p><strong>Latest:</strong> ${point?`${point.date} · ${formatValue(point,series)}`:'No data'}</p><p><strong>Checked:</strong> ${series.last_source_check||'Not logged'}</p>${captured}<p><strong>Release lag:</strong> ${series.release_lag_days??'Not set'} days</p><p><strong>Access:</strong> ${series.access_tier||'Unspecified'} · <strong>Update:</strong> ${series.update_method||'Unspecified'}</p><p><strong>Source:</strong> ${source}</p><p class="note">${series.status_note||'No status note logged.'}</p></article>`;
  }).join('');
}
init();
</script>
</body>
</html>
