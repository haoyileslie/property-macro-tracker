<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Underlying Data | Australian Property &amp; Macro Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F7F5EF;--navy:#1F3A6E;--navy-deep:#142748;--ink:#1B1F26;--slate:#5C6773;--line:#DEDACD;--card:#fff;}
  *{box-sizing:border-box;} body{margin:0;background:var(--cream);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;}
  .wrap{max-width:1000px;margin:0 auto;padding:32px 24px 80px;}
  .page-nav{display:flex;gap:18px;margin:0 0 24px;padding:0 0 12px;border-bottom:1px solid var(--line);}
  .page-nav a{color:var(--slate);font-size:.78rem;font-weight:600;text-decoration:none;}
  .page-nav a:hover,.page-nav a[aria-current="page"]{color:var(--navy);text-decoration:underline;text-underline-offset:5px;}
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;border-bottom:2px solid var(--navy);padding-bottom:18px;}
  h1{margin:0;font-family:'Source Serif 4',serif;font-size:clamp(1.6rem,3vw,2.2rem);color:var(--navy-deep);}
  .meta{font:0.75rem 'IBM Plex Mono',monospace;color:var(--slate);}
  .deck{margin:14px 0 28px;color:var(--slate);font-family:'Source Serif 4',serif;font-size:1rem;}
  .toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:end;margin-bottom:18px;}
  label{display:block;margin-bottom:6px;color:var(--slate);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
  select{width:100%;padding:10px 12px;border:1px solid var(--navy);border-radius:2px;background:#fff;color:var(--navy-deep);font:500 .84rem 'IBM Plex Sans',sans-serif;}
  button{padding:10px 13px;border:1px solid var(--navy);border-radius:2px;background:var(--navy);color:#fff;cursor:pointer;font:600 .78rem 'IBM Plex Sans',sans-serif;}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;margin-bottom:18px;border:1px solid var(--line);background:var(--line);}
  .summary div{padding:11px 12px;background:#fff;}.summary span{display:block;color:var(--slate);font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;}.summary strong{display:block;margin-top:4px;color:var(--navy-deep);font:500 .8rem 'IBM Plex Mono',monospace;overflow-wrap:anywhere;}
  .indicator-source{margin:-7px 0 18px;color:var(--slate);font-size:.78rem;}.indicator-source a{color:var(--navy);font-weight:600;text-underline-offset:3px;}
  .indicator-guide{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px;margin-bottom:18px;border:1px solid var(--line);background:var(--line);}
  .indicator-guide div{padding:12px 13px;background:#FBFAF6;}.indicator-guide h2{margin:0 0 5px;color:var(--navy-deep);font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;}.indicator-guide p{margin:0;color:var(--slate);font-size:.76rem;line-height:1.5;}
  .table-wrap{max-height:620px;overflow:auto;border:1px solid var(--line);background:#fff;}
  table{width:100%;border-collapse:collapse;font-size:.82rem;} th,td{padding:10px 14px;border-bottom:1px solid #ECE8DD;text-align:right;white-space:nowrap;} th:first-child,td:first-child{text-align:left;}
  th{position:sticky;top:0;background:#F4F1E8;color:var(--navy-deep);font-size:.67rem;text-transform:uppercase;letter-spacing:.06em;}
  .source-note{margin:12px 0 0;color:var(--slate);font-size:.76rem;line-height:1.5;}.source-note a{color:var(--navy);text-underline-offset:3px;}
  .back-link{display:inline-block;margin-top:24px;color:var(--navy);font-size:.8rem;font-weight:600;text-underline-offset:4px;}
  .error{padding:20px;border:1px solid var(--line);background:#fff;color:#893F2D;}
  @media(max-width:600px){header{display:block}.meta{margin-top:8px}.toolbar{grid-template-columns:1fr}.toolbar button{width:100%}.indicator-guide{grid-template-columns:1fr;}}
</style>
</head>
<body>
<main class="wrap">
  <nav class="page-nav" aria-label="Tracker pages">
    <a href="index.html">Dashboard</a>
    <a href="data.html" aria-current="page">Data tables</a>
    <a href="freshness.html">Data freshness</a>
  </nav>
  <header><h1>Underlying Data Tables</h1><div class="meta" id="lastUpdated">Loading...</div></header>
  <p class="deck">Select a series to inspect every observation used by the dashboard.</p>
  <div id="content">
    <div class="toolbar">
      <div><label for="seriesSelect">Indicator</label><select id="seriesSelect"></select></div>
      <button type="button" id="downloadCsv">Download CSV</button>
    </div>
    <div class="summary" id="summary"></div>
    <p class="indicator-source" id="indicatorSource"></p>
    <div class="indicator-guide" id="indicatorGuide"></div>
    <div class="table-wrap"><table><thead><tr><th>Date</th><th>Value</th><th>Unit</th></tr></thead><tbody id="dataRows"></tbody></table></div>
    <p class="source-note" id="sourceNote"></p>
    <a class="back-link" id="backToChart" href="index.html">Back to chart</a>
  </div>
</main>
<script>
let DATA;
let selectedKey;
const preferred=['cash_rate','unemployment_rate','employed_people','cpi_headline_yoy','cpi_trimmed_mean_yoy','building_approvals_total_dwellings','building_approvals_total_dwellings_state_proxy','housing_lending_rate_owner_occupier_variable','lending_new_loan_commitments_dwellings_number','lending_new_loan_commitments_dwellings_value','wage_growth_private_yoy','wage_growth_public_yoy','average_weekly_earnings_private','average_weekly_earnings_public','us_treasury_3y','us_treasury_10y','asx_200','sp_500','msci_acwi','asx_200_real_estate','asx_200_areit','lending_new_loan_commitments_dwellings_qoq','home_value_index_mom','vacancy_rate'];

function latest(points){return points?.length ? points[points.length-1] : null;}
function formatValue(point,series){if(!point)return 'No data';const value=Number(point.value).toLocaleString();if(series.unit==='count')return value;if(series.unit==='%')return `${value}%`;if(series.unit==='index points')return `${value} points`;return series.unit?`${value}${series.unit.startsWith(' ')?'':' '}${series.unit}`:value;}
function csvEscape(value){const text=String(value??'');return /[",\n]/.test(text)?`"${text.replace(/"/g,'""')}"`:text;}
function downloadCsv(){
  const series=DATA.series[selectedKey]; const points=series.data.National||[];
  const rows=[['series_key','series_label','date','value','unit','source'],...points.map(point=>[selectedKey,series.label,point.date,point.value,series.unit||'',series.source||''])];
  const blob=new Blob([rows.map(row=>row.map(csvEscape).join(',')).join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob); const link=document.createElement('a'); link.href=url; link.download=`${selectedKey}.csv`; link.click(); URL.revokeObjectURL(url);
}
function renderTable(){
  const series=DATA.series[selectedKey]; const points=series.data.National||[]; const point=latest(points);
  const url=new URL(window.location.href); url.searchParams.set('series',selectedKey); history.replaceState({},'',url);
  const captured=series.snapshot_captured_at?`<div><span>Snapshot captured</span><strong>${series.snapshot_captured_at}</strong></div>`:'';
  document.getElementById('summary').innerHTML=`<div><span>Observations</span><strong>${points.length}</strong></div><div><span>History starts</span><strong>${points[0]?.date||'No data'}</strong></div><div><span>Frequency</span><strong>${series.frequency||'Unknown'}</strong></div><div><span>Latest period</span><strong>${point?.date||'No data'}</strong></div><div><span>Latest value</span><strong>${formatValue(point,series)}</strong></div>${captured}`;
  document.getElementById('indicatorSource').innerHTML=`${series.source||'Source not logged'}${series.source_url?` · <a href="${series.source_url}" target="_blank" rel="noopener">Source</a>`:''}`;
  document.getElementById('indicatorGuide').innerHTML=`<div><h2>Definition</h2><p>${series.definition||'Definition not yet documented.'}</p></div><div><h2>How to use it</h2><p>${series.usage||'Usage guidance not yet documented.'}</p></div><div><h2>Housing-market link</h2><p>${series.housing_market_link||'Housing-market relationship not yet documented.'}</p></div>`;
  document.getElementById('dataRows').innerHTML=[...points].reverse().map(item=>`<tr><td>${item.date}</td><td>${Number(item.value).toLocaleString()}</td><td>${series.unit||''}</td></tr>`).join('')||'<tr><td colspan="3">No observations logged.</td></tr>';
  const source=series.source||'Source not logged'; const sourceUrl=series.source_url;
  document.getElementById('sourceNote').innerHTML=`<strong>Source:</strong> ${sourceUrl?`<a href="${sourceUrl}" target="_blank" rel="noopener">${source}</a>`:source}.`;
  document.getElementById('backToChart').href=`index.html?series=${encodeURIComponent(selectedKey)}#seriesTitle`;
}
async function init(){
  try{const response=await fetch('./property_data.json',{cache:'no-store'});if(!response.ok)throw new Error('Data file unavailable');DATA=await response.json();}
  catch(error){document.getElementById('content').innerHTML=`<div class="error">Could not load property_data.json. Open this page through the local web server.</div>`;return;}
  document.getElementById('lastUpdated').textContent=`Last updated: ${DATA.meta.last_updated}`;
  const keys=[...preferred,...Object.keys(DATA.series).filter(key=>!preferred.includes(key))].filter(key=>DATA.series[key]);
  const requested=new URLSearchParams(location.search).get('series'); selectedKey=DATA.series[requested]?requested:keys[0];
  const select=document.getElementById('seriesSelect'); select.innerHTML=keys.map(key=>{const series=DATA.series[key];const suffix=(series.data.National||[]).length===1?' (snapshot)':'';return `<option value="${key}" ${key===selectedKey?'selected':''}>${series.label}${suffix}</option>`;}).join('');
  select.addEventListener('change',()=>{selectedKey=select.value;renderTable();}); document.getElementById('downloadCsv').addEventListener('click',downloadCsv); renderTable();
}
init();
</script>
</body>
</html>
