name: Validate market listings

on:
  workflow_dispatch:
  push:
    paths:
      - "listings.html"
      - "market_listings_latest.json"
      - "market_listings_vintages.json"
      - "ingest_listings.py"
      - "tests/test_ingest_listings.py"
      - ".github/workflows/refresh-listings.yml"
  pull_request:
    paths:
      - "listings.html"
      - "market_listings_latest.json"
      - "market_listings_vintages.json"
      - "ingest_listings.py"
      - "tests/test_ingest_listings.py"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate privacy-safe listing export
        run: python3 ingest_listings.py

      - name: Run listing regression tests
        run: python3 -m unittest tests.test_ingest_listings -v
